<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access</title>

  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f2f5fb;
      --bg2:      #e8edf7;
      --white:    #ffffff;
      --border:   #dae0ef;
      --border2:  #c2cce0;
      --text:     #0b1526;
      --text2:    #374160;
      --text3:    #7e8aa6;
      --navy:     #0d2151;
      --navy2:    #162e6e;
      --blue:     #1e56c4;
      --blue-lt:  #e4ecfb;
      --green:    #0ea86e;
      --green-bg: #e5f8f1;
      --red:      #cc2b2b;
      --shadow:   0 4px 20px rgba(13,33,81,.08), 0 1px 4px rgba(13,33,81,.05);
      --shadow-lg:0 20px 60px rgba(13,33,81,.13), 0 4px 16px rgba(13,33,81,.07);
    }
    html, body { height: 100%; }
    body {
      min-height: 100vh; font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 52px 52px; pointer-events: none;
    }

    /* Orb glow */
    .orb {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 700px; height: 500px; pointer-events: none;
      background: radial-gradient(ellipse, rgba(30,86,196,.18) 0%, transparent 65%);
    }

    /* Card */
    .card {
      position: relative; z-index: 2;
      background: var(--white); border-radius: 20px;
      box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
      overflow: hidden;
    }

    /* Card top bar */
    .card-top {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .card-top-title {
      font-family: 'JetBrains Mono', monospace; font-size: .62rem;
      color: var(--text3); margin-left: 4px;
    }
    .card-top-badge {
      margin-left: auto; font-size: .6rem; font-weight: 800;
      padding: 2px 9px; border-radius: 100px;
      background: rgba(13,33,81,.07); color: var(--navy);
      border: 1px solid var(--border2); letter-spacing: .04em;
      display: flex; align-items: center; gap: 5px;
    }

    /* Card body */
    .card-body { padding: 36px 32px 32px; }

    .shield-icon {
      width: 52px; height: 52px; background: var(--navy); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem; margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(13,33,81,.3);
    }

    h1 { font-size: 1.7rem; font-weight: 900; color: var(--navy); letter-spacing: -.04em; margin-bottom: 6px; }
    .subtitle { font-size: .84rem; color: var(--text3); margin-bottom: 28px; }

    /* Error */
    .error-msg {
      display: none; padding: 11px 14px;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; color: var(--red); font-size: .82rem;
      margin-bottom: 16px; display: none; align-items: center; gap: 8px;
    }
    .error-msg.show { display: flex; }

    /* Fields */
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: .75rem; font-weight: 700; color: var(--text2); margin-bottom: 7px; letter-spacing: .03em; }
    .field-wrap { position: relative; }
    .field-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .78rem; pointer-events: none; }
    .field input {
      width: 100%; padding: 12px 14px 12px 36px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 10px; font-family: 'Outfit', sans-serif;
      font-size: .9rem; color: var(--text); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 3px rgba(30,86,196,.1); }
    .field input.error { border-color: var(--red); box-shadow: 0 0 0 3px rgba(204,43,43,.1); }

    /* Toggle password */
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text3);
      font-size: .78rem; padding: 4px; transition: color .15s;
    }
    .toggle-pw:hover { color: var(--navy); }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 14px; background: var(--navy); color: white;
      border: none; border-radius: 10px; font-family: 'Outfit', sans-serif;
      font-size: .95rem; font-weight: 700; cursor: pointer; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(13,33,81,.3); transition: all .15s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--navy2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,33,81,.4); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; display: none; }

    /* Footer note */
    .card-foot {
      border-top: 1px solid var(--border); padding: 14px 32px;
      display: flex; align-items: center; gap: 8px;
      font-size: .72rem; color: var(--text3); background: var(--bg2);
    }
    .card-foot i { color: var(--green); }

    /* Attempt counter */
    .attempts-note { font-size: .72rem; color: var(--text3); text-align: center; margin-top: 12px; min-height: 18px; }
  </style>
</head>
<body>

<div class="orb"></div>

<div class="card">
  <!-- Fake browser bar -->
  <div class="card-top">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#ffbd2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span class="card-top-title">admin.competentmanagement.com</span>
    <span class="card-top-badge"><i class="fas fa-lock" style="font-size:.55rem"></i> Restricted</span>
  </div>

  <div class="card-body">
    <div class="shield-icon"><i class="fas fa-shield-halved"></i></div>
    <h1>Admin Access</h1>
    <p class="subtitle">This page is not publicly listed. Verified credentials only.</p>

    <div class="error-msg" id="errorMsg">
      <i class="fas fa-circle-exclamation"></i>
      <span id="errorText">Invalid credentials.</span>
    </div>

    <div class="field">
      <label>Email Address</label>
      <div class="field-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email" required>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" required>
        <button class="toggle-pw" type="button" id="togglePw" tabindex="-1">
          <i class="fas fa-eye" id="togglePwIcon"></i>
        </button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn">
      <span id="btnText">Access Admin Panel</span>
      <div class="spinner" id="spinner"></div>
      <i class="fas fa-arrow-right" id="btnArrow"></i>
    </button>

    <div class="attempts-note" id="attemptsNote"></div>
  </div>

  <div class="card-foot">
    <i class="fas fa-circle-check"></i>
    Secured with Firebase Authentication + Admin Claims
  </div>
</div>
<div id="loginError"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbiHersDtAntTb3oWqyN1zZDYW3bzwrDU",
    authDomain: "competent-management.firebaseapp.com",
    projectId: "competent-management",
    storageBucket: "competent-management.firebasestorage.app",
    messagingSenderId: "984767087244",
    appId: "1:984767087244:web:47e86734d0e402878eb1a9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const emailInput    = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const submitBtn     = document.getElementById('submitBtn');
  const spinner       = document.getElementById('spinner');
  const btnText       = document.getElementById('btnText');
  const btnArrow      = document.getElementById('btnArrow');
  const errorMsg      = document.getElementById('errorMsg');
  const errorText     = document.getElementById('errorText');
  const attemptsNote  = document.getElementById('attemptsNote');
  const togglePw      = document.getElementById('togglePw');
  const togglePwIcon  = document.getElementById('togglePwIcon');

  let failedAttempts = 0;
  const MAX_ATTEMPTS = 5;

  // If already logged in and admin, go straight through
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    try {
      const token = await user.getIdTokenResult();
      if (token.claims.admin) {
        window.location.href = "admin.html";
      }
    } catch (e) {}
  });

  // Toggle password visibility
  togglePw.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    togglePwIcon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
  });

  // Submit on Enter
  [emailInput, passwordInput].forEach(el => {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  });

  submitBtn.addEventListener('click', handleLogin);

  async function handleLogin() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    // Clear previous errors
    hideError();
    emailInput.classList.remove('error');
    passwordInput.classList.remove('error');

    // Basic validation
    if (!email) { emailInput.classList.add('error'); emailInput.focus(); return; }
    if (!password) { passwordInput.classList.add('error'); passwordInput.focus(); return; }

    // Rate limit
    if (failedAttempts >= MAX_ATTEMPTS) {
      showError("Too many failed attempts. Please wait and try again.");
      return;
    }

    setLoading(true);

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const token = await cred.user.getIdTokenResult();

      if (!token.claims.admin) {
        await auth.signOut();
        failedAttempts++;
        showError("Access denied. This account does not have admin privileges.");
        updateAttemptsNote();
        setLoading(false);
        return;
      }

      // Success — go to admin
      btnText.textContent = "Authenticated ✓";
      setTimeout(() => { window.location.href = "admin.html"; }, 600);

    } catch (err) {
      failedAttempts++;
      updateAttemptsNote();
      setLoading(false);

      const code = err.code || '';
      if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
        showError("Incorrect email or password.");
        passwordInput.value = '';
        passwordInput.focus();
      } else if (code === 'auth/too-many-requests') {
        showError("Too many attempts. Firebase has temporarily locked this account.");
      } else if (code === 'auth/network-request-failed') {
        showError("Network error. Check your connection and try again.");
      } else {
        showError("Login failed. Check console for details.");
        console.error(err);
      }
    }
  }

  function setLoading(val) {
    submitBtn.disabled = val;
    spinner.style.display = val ? 'block' : 'none';
    btnArrow.style.display = val ? 'none' : 'inline';
    btnText.textContent = val ? 'Verifying...' : 'Access Admin Panel';
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.add('show');
  }

  function hideError() {
    errorMsg.classList.remove('show');
  }

  function updateAttemptsNote() {
    const remaining = MAX_ATTEMPTS - failedAttempts;
    if (remaining > 0 && failedAttempts > 0) {
      attemptsNote.textContent = `${remaining} attempt${remaining === 1 ? '' : 's'} remaining`;
    } else if (remaining <= 0) {
      attemptsNote.textContent = 'No attempts remaining. Refresh to try again.';
    }
  }
</script>
</body>
</html>
