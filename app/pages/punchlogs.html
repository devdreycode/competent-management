<div id="page-punchlogs" class="page">
        <div class="sec-header">
          <div><div class="sec-title">Punch Logs</div><div class="sec-sub">Full clock-in/out history</div></div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="openNewTab()">🕐 Open Kiosk</button>
            <input type="date" id="punchLogDate" style="padding:7px 11px;border:1px solid var(--chrome-border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.845rem;background:var(--surface);color:var(--text);outline:none;">
          </div>
        </div>
        <div class="tab-bar">
          <button class="tab-btn active" id="btn-shiftLogs" onclick="switchTab('shiftLogs')">⏱ Shift Events</button>
          <button class="tab-btn" id="btn-breakLogs" onclick="switchTab('breakLogs')">☕ Break Events</button>
        </div>
        <div id="shiftLogs" class="tab-content active">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Employee</th><th>Event</th><th>Date &amp; Time</th><th>Source</th><th>Duration</th><th>Actions</th></tr></thead>
              <tbody id="shiftBody"><tr class="empty-row"><td colspan="6">No activity found.</td></tr></tbody>
            </table>
          </div>
        </div>
        <div id="breakLogs" class="tab-content">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Employee</th><th>Event</th><th>Date &amp; Time</th><th>Source</th><th>Duration</th><th>Actions</th></tr></thead>
              <tbody id="breakBody"><tr class="empty-row"><td colspan="6">No activity found.</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
