<!-- admin-messages.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Messages | Competent Management</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      color:#111827;
    }

    .layout{
      display:flex;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:#0f172a;
      color:white;
      padding:24px;
    }

    .sidebar h2{
      margin-bottom:32px;
      font-size:1.4rem;
    }

    .sidebar a{
      display:block;
      color:#cbd5e1;
      text-decoration:none;
      padding:12px 14px;
      border-radius:10px;
      margin-bottom:8px;
      transition:.2s;
    }

    .sidebar a:hover{
      background:#1e293b;
      color:white;
    }

    .sidebar a.active{
      background:#2563eb;
      color:white;
    }

    /* MAIN */
    .main{
      flex:1;
      padding:32px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .topbar h1{
      font-size:2rem;
    }

    .message-grid{
      display:grid;
      gap:20px;
    }

    .message-card{
      background:white;
      border-radius:18px;
      padding:24px;
      border:1px solid #dbe3f0;
      box-shadow:0 4px 18px rgba(0,0,0,.05);
    }

    .message-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
    }

    .message-name{
      font-size:1.1rem;
      font-weight:700;
    }

    .message-email{
      color:#2563eb;
      font-size:.92rem;
      margin-top:4px;
    }

    .message-date{
      font-size:.82rem;
      color:#64748b;
    }

    .message-subject{
      font-weight:700;
      margin-bottom:12px;
    }

    .message-body{
      line-height:1.7;
      color:#334155;
      white-space:pre-wrap;
    }

    .empty{
      background:white;
      border-radius:16px;
      padding:40px;
      text-align:center;
      border:1px solid #dbe3f0;
      color:#64748b;
    }

    @media(max-width:900px){

      .layout{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
      }

    }
  </style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>Admin Panel</h2>

    <a href="admin.html">Dashboard</a>
    <a href="admin-users.html">Users</a>
    <a href="admin-messages.html" class="active">
      Contact Messages
    </a>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Contact Messages</h1>
    </div>

    <div id="messageGrid" class="message-grid">

      <div class="empty">
        Loading messages...
      </div>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const messageGrid =
  document.getElementById("messageGrid");

onAuthStateChanged(auth, async(user) => {

  if(!user){

    window.location.href = "login.html";

    return;
  }

  loadMessages();

});

async function loadMessages(){

  try{

    const q = query(
      collection(db, "contact_messages"),
      orderBy("createdAt", "desc")
    );

    const snap = await getDocs(q);

    if(snap.empty){

      messageGrid.innerHTML = `
        <div class="empty">
          No contact messages yet.
        </div>
      `;

      return;
    }

    messageGrid.innerHTML = "";

    snap.forEach(docSnap => {

      const data = docSnap.data();

      const date =
        data.createdAt?.toDate?.()
        ?.toLocaleString() || "Unknown";

      const card = document.createElement("div");

      card.className = "message-card";

      card.innerHTML = `

        <div class="message-top">

          <div>

            <div class="message-name">
              ${data.name || "Unknown"}
            </div>

            <div class="message-email">
              ${data.email || "No Email"}
            </div>

          </div>

          <div class="message-date">
            ${date}
          </div>

        </div>

        <div class="message-subject">
          ${data.subject || "No Subject"}
        </div>

        <div class="message-body">
          ${data.message || "No Message"}
        </div>

      `;

      messageGrid.appendChild(card);

    });

  }catch(error){

    console.error(error);

    messageGrid.innerHTML = `
      <div class="empty">
        Failed to load messages.
      </div>
    `;

  }

}

</script>

</body>
</html>
